# prek configuration - https://github.com/j178/prek
# Run: npx prek install (to install git hooks)
# Run: npx prek run --all-files (to run all hooks)

repos:
  # Built-in hooks (fast, Rust-native)
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        exclude: \.cypilot/(\.core|\.gen|config/kits)/
      - id: end-of-file-fixer
        exclude: \.cypilot/(\.core|\.gen|config/kits)/
      - id: check-yaml
        exclude: \.cypilot/(\.core|\.gen|config/kits)/
      - id: check-json
        exclude: (tsconfig\.json$|\.cypilot/(\.core|\.gen|config/kits)/)
      - id: check-toml
        exclude: \.cypilot/(\.core|\.gen|config/kits)/
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: package-lock\.json$

  # Local hooks for project-specific checks
  - repo: local
    hooks:
      - id: audit-high
        name: Audit dependencies for high severity vulnerabilities
        entry: npm audit --audit-level=high --omit=dev
        language: system
        pass_filenames: false
      - id: arch-check
        name: Architecture check
        entry: npm run arch:check
        language: system
        pass_filenames: false
