---
# Codacy configuration
# See: https://docs.codacy.com/repositories-configure/codacy-configuration-file/

# Exclude non-production code from security/quality analysis.
# These paths legitimately use patterns that static scanners flag as security
# risks (dynamic fs operations, unbound methods in test mocks, non-literal
# regex patterns) but are controlled by internal config or test fixtures.
exclude_paths:
  # Test files — test fixtures use dynamic keys, non-null assertions on
  # tested values, and unbound method references on mocked prototypes.
  - "packages/**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"

  # Test-utility fixtures — Vitest fixture helpers (mock bridges, mock
  # registries) trip Playwright lint rules (e.g. "Non-serializable
  # expression must be wrapped with $(...)") that don't apply outside of
  # `page.evaluate()` contexts. These files contain no Playwright code.
  - "**/__test-utils__/**"
  - "packages/**/__test-utils__/**"

  # Dev-only scripts — spawn() and fs operations take paths from the
  # monorepo's own config, not user input. Not exposed to runtime.
  - "scripts/**"
  - "packages/cli/scripts/**"

  # Root Vitest plumbing — `vitest.shared.ts` is a build-time test-config
  # module loaded by `tsx`. It calls `readFileSync` on paths derived from
  # `import.meta.url` (no external input) and embeds a `'[sharedSetupFile]'`
  # template token that trips Codacy's "potential secret" pattern.
  - "vitest.shared.ts"

  # CLI scaffold templates — code meant to be copied into new projects,
  # not to be linted in the kit itself.
  - "packages/cli/template-sources/**"

  # Generated MFE manifest (build artifact).
  - "src/app/mfe/generated-mfe-manifests.json"

  # Architecture artifacts (PRD/ADR/DESIGN/FEATURE/etc.) — cypilot owns
  # markdown validation for these via its own validator (TOC anchors,
  # cross-refs, traceability). Codacy's markdownlint rules (notably
  # MD051 link-fragment validity) use GitHub-style slugification that
  # disagrees with cypilot's slug rule on edge cases (e.g. headings
  # starting with `_`), producing duplicate-but-conflicting findings.
  # cypilot is the authoritative validator for this tree.
  - "architecture/**"

  # CLI ai-sync command + project generator — construct every fs path
  # from the resolved projectRoot/templatesDir plus string literals via
  # resolvePathUnderProjectRoot() (path-traversal-safe helper). Dynamic-
  # path findings on readFile/writeFile sinks here are false positives
  # of the same shape as the already-excluded scripts/ tree.
  - "packages/cli/src/commands/ai/sync.ts"
  - "packages/cli/src/generators/project.ts"

  # CLI path-resolver trust kernel — `joinUnderRoot` is the helper every
  # other CLI module funnels untrusted segments through. It (1) rejects
  # `.`/`..` segments and anything outside `[A-Za-z0-9_.-]+`, then
  # (2) re-verifies the resolved path stays under `root` via
  # `path.relative`. The `path.resolve(root)` call on L17 trips the
  # "user input into path.join/resolve" rule because `root` is a
  # parameter — but this file is the boundary that makes the rule
  # unnecessary downstream. Editing requires security review.
  - "packages/cli/src/utils/fs.ts"

  # CLI project-root trust kernel — `resolvePathUnderProjectRoot` is the
  # sibling of `joinUnderRoot` for project-rooted paths (config, screensets,
  # monorepo lookup). Same shape: (1) rejects non-absolute roots and null
  # bytes, (2) accepts only single path segments (no `.`/`..`/separators/
  # null bytes), then (3) re-verifies containment via `path.relative`.
  # The `path.resolve(projectRoot)` and `path.join(cursor, seg)` calls trip
  # the "user input into path.join/resolve" rule for the same reason as
  # fs.ts — this file is the boundary. Editing requires security review.
  - "packages/cli/src/utils/project.ts"

  # Audited trust kernel — this file concentrates patterns that static
  # analyzers flag as unsafe (non-literal RegExp with escaped inputs,
  # dynamic import of blob URLs). Every function in it is required by a
  # custom ESLint rule to document its safety argument via `@safety-reviewed`
  # and `@why` JSDoc tags. Editing this file requires security review.
  - "packages/screensets/src/mfe/handler/mf-dynamic-module-ops.ts"

  # Monorepo package manifests.
  #
  # Codacy's Semgrep rule `npm.security.package-dependencies-check` flags
  # every non-exact version spec in peerDependencies (>=, hyphen-range, ^, ~
  # all trigger it). But range syntax is exactly what npm's peerDependencies
  # spec requires — a library declares a compatible range, and the consuming
  # app pins the actual version. Exact pinning in peer deps would force
  # consumers to match our installed version, defeating the peer mechanism.
  #
  # Every @cyberfabric/* package in this repo uses ranged peer deps (>= or ^)
  # consistently — the rule fires on all of them and the exclusion is applied
  # repo-wide so all packages are treated uniformly. Loss: this specific rule
  # no longer audits our package.json files. Kept: all other Codacy checks
  # still run on these files; real dependency security (vulnerable versions,
  # malicious packages) is covered by other tools (Aikido, npm audit, Snyk).
  - "packages/*/package.json"
