name: CLI PR E2E

# This workflow only exercises the CLI scaffold end-to-end paths. Monorepo
# unit-test coverage (including `packages/cli`'s own unit tests under
# `vitest`) is run by `main.yml` on the same pull_request trigger, so
# duplicating `npm run test:unit` here would just double the CI cost for
# every PR. If the CLI ever grows a regression path that unit tests miss
# but main.yml does not yet guard, add an explicit check here (ideally via
# a `--workspace=@cyberfabric/cli` test run) rather than re-running the
# whole monorepo suite.
on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: cli-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  cli-pr-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-manager: [npm, pnpm, yarn]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 24.14.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.x
          cache: npm

      - name: Enable Corepack
        run: corepack enable

      - name: Activate test package manager
        run: corepack prepare ${{ matrix.package-manager }}@latest --activate

      - name: Install dependencies
        run: npm ci

      - name: Build all packages (topological order)
        run: npm run build:packages

      - name: Run CLI PR E2E
        run: npm run test:e2e:pr --workspace=@cyberfabric/cli
        env:
          CLI_E2E_ARTIFACT_DIR: .artifacts/cli-e2e/pr
          FRONTX_USE_LOCAL: '1'
          FRONTX_MONOREPO_ROOT: ${{ github.workspace }}
          CLI_E2E_PM: ${{ matrix.package-manager }}

      - name: Upload CLI E2E artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cli-pr-e2e-logs-${{ matrix.package-manager }}
          path: .artifacts/cli-e2e/pr
          retention-days: 14
