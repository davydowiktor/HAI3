name: Main CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.14.x, 25.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: npm ci

    # MFE packages under `src/mfe_packages/*` are NOT npm workspaces — each
    # has its own lockfile because Module Federation runtimes load them as
    # isolated apps. The root `npm ci` above does not install their deps, so
    # `type-check:mfe` and MFE-scoped unit tests can't resolve third-party
    # packages (@radix-ui, @tanstack/react-table, recharts, vaul, …) until
    # each MFE is installed in place.
    - name: Install MFE dependencies
      run: |
        for mfe in src/mfe_packages/*/; do
          if [ -f "$mfe/package-lock.json" ]; then
            echo "==> npm ci in $mfe"
            (cd "$mfe" && npm ci)
          fi
        done

    # Consumer packages (framework, react, studio, cli) resolve workspace deps
    # via their sibling packages' `dist/` types. A fresh `npm ci` has no dist,
    # so `type-check:packages:*` fails to resolve `@cyberfabric/*` imports.
    # Build the packages first so tsc can resolve types across workspaces.
    - name: Build workspace packages
      run: npm run build:packages

    - name: Run TypeScript validation
      run: npm run type-check:all

    - name: Run lint (includes test-dep version guard via lint:deps)
      run: npm run lint

    # Sequential `--coverage` (no `--parallel`) to keep v8 instrumentation under
    # the per-test timeout budget. Parallel project spawns + coverage workers
    # together caused intermittent 5s test timeouts in resource-constrained
    # runners. Gates the COVERAGE_THRESHOLDS defined in vitest.shared.ts.
    - name: Run unit tests with coverage gating
      run: npm run test:unit -- --coverage

    - name: Audit dependencies for high severity vulnerabilities
      run: npm audit --audit-level=high --omit=dev

    - name: Run architecture validation
      run: npm run arch:check

  cypilot-validate:
    name: Cypilot Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate artifacts and traceability
        run: python3 .cypilot/.core/skills/cypilot/scripts/cypilot.py validate

  cypilot-validate-kits:
    name: Cypilot Validate Kits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate installed kits
        run: python3 .cypilot/.core/skills/cypilot/scripts/cypilot.py validate-kits

  cypilot-spec-coverage:
    name: Cypilot Spec Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check spec coverage thresholds
        # TODO: Raise thresholds as coverage improves — see architecture/workflows/spec-coverage-improvement.md
        # Threshold lowered from 52 → 51 after removing CI/CD YAML from codebase scan (publishing-pipeline markers removed)
        run: >-
          python3 .cypilot/.core/skills/cypilot/scripts/cypilot.py
          spec-coverage
          --min-coverage 58
          --min-granularity 0.28

  dependency-graph:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '25.x'
        cache: 'npm'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: npm ci

    - name: Generate dependency graph
      run: |
        npm run arch:dot || echo "Failed to generate DOT file"

    - name: Upload dependency graph
      uses: actions/upload-artifact@v5
      with:
        name: dependency-graph
        path: dependency-graph.dot
        retention-days: 30
      continue-on-error: true
